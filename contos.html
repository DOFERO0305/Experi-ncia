<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Histórias Antigas | Atualização Diária</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* NOVA PALETA DE CORES: DOURADO PREMIUM */
            --primary-gold: #d4af37;
            --light-gold: #f7dc6f;
            --dark-gold: #b59410;
            --bg-color: #0d1117;
            --surface-color: #161b22;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --shadow-gold: rgba(212, 175, 55, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            padding-bottom: 20px;
        }

        /* Container Principal */
        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }

        /* HEADER */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        .date-box { color: var(--text-secondary); font-size: 0.9rem; }
        .refresh-icon { color: var(--primary-gold); font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .refresh-icon:hover { color: var(--light-gold); transform: rotate(180deg); }

        /* ESTRUTURA: Player + Sidebar */
        .main-layout { display: flex; gap: 20px; flex-wrap: wrap; }
        .main-content { flex: 2; min-width: 300px; }
        .sidebar { flex: 1; min-width: 280px; }

        /* BLOCO DO PLAYER DE VÍDEO PRINCIPAL */
        .video-player-container { background-color: var(--surface-color); padding: 10px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 15px; position: relative; }
        
        .video-box {
            position: relative;
            width: 100%;
            padding-top: 177.77%; /* Proporção 9:16 vertical */
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 🔒 TÉCNICA DE BLOQUEIO TOTAL DO PLAYER DO FACEBOOK */
        /* Escudo Invisível Superior (Bloqueia Foto, Nome "Histórias Antigas" e Botão Seguir) */
        .lock-shield-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px; /* Altura exata da barra de perfil do FB */
            z-index: 10;
            background: rgba(0,0,0,0.01); /* Quase invisível mas clicável */
            cursor: default;
        }
        
        /* Escudo Invisível Inferior (Bloqueia "Ver mais no Facebook" e Reels Relacionados no final) */
        .lock-shield-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px; /* Cobre a barra inferior inteira */
            z-index: 10;
            background: rgba(0,0,0,0.01);
            cursor: default;
        }
        /* O centro do vídeo permanece livre para Play/Pause nativo */

        /* Metadados do Vídeo */
        .video-meta { margin-top: 15px; }
        .profile-line { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .profile-info { display: flex; align-items: center; gap: 10px; }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary-gold); object-fit: cover; }
        .profile-name { font-weight: 700; color: #fff; font-size: 1.1rem; }
        
        /* Tag Dourada Dinâmica */
        .last-update-tag {
            background: linear-gradient(45deg, var(--dark-gold), var(--primary-gold));
            color: #000; font-weight: 800; font-size: 0.75rem;
            padding: 5px 12px; border-radius: 20px; text-transform: uppercase;
            box-shadow: 0 0 10px var(--shadow-gold);
        }

        /* 🆕 NOVO BOTÃO DOURADO ANIMADO QUE ROLA PARA BAIXO */
        .scroll-down-btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, var(--dark-gold), var(--primary-gold), var(--light-gold));
            background-size: 200% 200%;
            color: #000;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            
            /* Animação para chamar atenção */
            animation: gold-pulse 2s infinite, gradient-move 3s infinite linear;
        }

        @keyframes gold-pulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        
        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .scroll-down-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .scroll-down-btn:active { transform: translateY(1px); }

        /* SIDEBAR / PLUGIN DE PÁGINA */
        .fb-page-container { background-color: var(--surface-color); border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; position: sticky; top: 15px; }

        /* TÍTULO SEÇÃO REELS */
        .header-2 { max-width: 1200px; margin: 30px auto 15px; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; }
        .header-2 h2 { font-weight: 800; font-size: 1.3rem; }
        .count-tag { color: var(--text-secondary); font-size: 0.9rem; font-weight: 400; }

        /* GRELHA DE VÍDEOS (REELS Relacionados) */
        .reels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        
        .reel-card {
            background-color: var(--surface-color);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .reel-card:hover { transform: translateY(-5px); border-color: var(--primary-gold); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }

        .card-thumb { position: relative; width: 100%; padding-top: 133%; /* Proporção 3:4 */ background-color: #000; }
        .card-thumb img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .reel-card:hover .card-thumb img { transform: scale(1.05); }

        /* Botão Play no Card */
        .play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; z-index: 2; }
        .reel-card:hover .play-overlay { opacity: 1; }
        .play-overlay i {
            color: #000; background-color: var(--light-gold);
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 0 15px var(--primary-gold);
        }

        .card-info { padding: 10px; }
        .card-title { font-size: 0.85rem; font-weight: 600; color: var(--text-primary); line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 5px; }
        .card-date { font-size: 0.75rem; color: var(--text-secondary); }

        /* LOADING SPINNER DOURADO */
        .loading { grid-column: 1 / -1; text-align: center; padding: 40px 0; color: var(--primary-gold); font-size: 1.5rem; }

        /* RODAPÉ */
        .footer { max-width: 1200px; margin: 0 auto; padding: 20px 15px; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-secondary); font-size: 0.8rem; }
        .dev-sig { margin-top: 5px; font-weight: 600; }
        .dev-sig a { color: var(--primary-gold); text-decoration: none; }

        /* Responsividade */
        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .profile-name { font-size: 1rem; }
            .fb-page-container { position: static; width: 100%; display: flex; justify-content: center; }
        }
        @media (max-width: 480px) {
            .reels-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .logo { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/pt_PT/sdk.js#xfbml=1&version=v17.0"></script>

    <div class="container">
        <header class="header">
            <div class="date-box" id="current-date">A carregar data...</div>
            <i class="fas fa-sync-alt refresh-icon" onclick="location.reload()" title="Atualizar página"></i>
        </header>

        <div class="main-layout">
            <div class="main-content">
                <div class="video-player-container">
                    <div class="video-box" id="main-video-box">
                        <div class="lock-shield-top" title="Assistir no site"></div>
                        
                        <iframe id="fb-video-iframe" src="https://www.facebook.com/plugins/video.php?href=https%3A%2F%2Fwww.facebook.com%2FHistoriasAntigasOficial%2Fvideos%2F807755357876251%2F&show_text=false&t=0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>
                        
                        <div class="lock-shield-bottom" title="Assistir no site"></div>
                    </div>

                    <div class="video-meta">
                        <div class="profile-line">
                            <div class="profile-info">
                                <img src="https://graph.facebook.com/HistoriasAntigasOficial/picture?type=large" alt="Histórias Antigas" class="profile-pic">
                                <span class="profile-name">Histórias Antigas</span>
                            </div>
                            <span class="last-update-tag" id="dynamic-update-time">A verificar...</span>
                        </div>
                    </div>
                </div>

                <button class="scroll-down-btn" onclick="scrollToReels()">
                    <i class="fas fa-clapperboard"></i>
                    Assistir outras Histórias
                    <i class="fas fa-arrow-down"></i>
                </button>
            </div>

            <aside class="sidebar">
                <div class="fb-page-container">
                    <div class="fb-page" 
                        data-href="https://www.facebook.com/HistoriasAntigasOficial" 
                        data-tabs="timeline" 
                        data-width="500" 
                        data-height="500" 
                        data-small-header="false" 
                        data-adapt-container-width="true" 
                        data-hide-cover="false" 
                        data-show-facepile="true">
                        <blockquote cite="https://www.facebook.com/HistoriasAntigasOficial" class="fb-xfbml-parse-ignore">
                            <a href="https://www.facebook.com/HistoriasAntigasOficial">Histórias Antigas</a>
                        </blockquote>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <section class="header-2" id="reels-section">
        <h2>Recém Chegadas à Grelha</h2>
        <span class="count-tag" id="video-count">Carregando feed...</span>
    </section>

    <div class="container">
        <main class="reels-grid" id="reels-grid">
            <div class="loading" id="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i>
            </div>
            </main>
    </div>

    <footer class="footer">
        <p>&copy; <span id="year"></span> Histórias Antigas. Todos os direitos reservados.</p>
        <p class="dev-sig">Plataforma desenvolvida por <a href="mailto:donald.fer.fer@gmail.com">Donald Rodrigues</a></p>
    </footer>

    <script>
        // Configuração
        const RSS_FEED_URL = 'https://rss.app/feeds/v1.1/PDQAMdRWA2z7DOqb.json';
        const FB_PAGE_URL = 'https://www.facebook.com/HistoriasAntigasOficial';

        // Elementos DOM
        const reelsGrid = document.getElementById('reels-grid');
        const videoCountSpan = document.getElementById('video-count');
        const dynamicUpdateTime = document.getElementById('dynamic-update-time');
        const mainVideoIframe = document.getElementById('fb-video-iframe');

        // Formatação de Data Atual
        function updateCurrentDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').innerText = now.toLocaleDateString('pt-PT', options);
            document.getElementById('year').innerText = now.getFullYear();
        }

        // Formatação de Tempo Relativo (Há X minutos)
        function formatRelativeTime(dateString) {
            const now = new Date();
            const past = new Date(dateString);
            const diffInSeconds = Math.floor((now - past) / 1000);

            if (diffInSeconds < 60) return `Há ${diffInSeconds}s`;
            const diffInMinutes = Math.floor(diffInSeconds / 60);
            if (diffInMinutes < 60) return `Há ${diffInMinutes}min`;
            const diffInHours = Math.floor(diffInMinutes / 60);
            if (diffInHours < 24) return `Há ${diffInHours}h`;
            const diffInDays = Math.floor(diffInHours / 24);
            return `Há ${diffInDays} dias`;
        }

        // 🆕 FUNÇÃO PARA ROLAR ATÉ A SEÇÃO DE REELS
        function scrollToReels() {
            const reelsSection = document.getElementById('reels-section');
            if (reelsSection) {
                // Rola suavemente até o elemento, compensando um pouco o topo para não grudar
                const topOffset = reelsSection.getBoundingClientRect().top + window.pageYOffset - 10;
                window.scrollTo({
                    top: topOffset,
                    behavior: 'smooth'
                });
            }
        }

        // Função para trocar o vídeo principal e rolar para o topo
        function changeMainVideo(videoUrl) {
            // Converte URL normal do FB em URL de embed
            let embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(videoUrl)}&show_text=false&t=0`;
            
            // Troca o src do iframe
            mainVideoIframe.src = embedUrl;
            
            // Rola suavemente para o topo do player para o usuário assistir
            window.scrollTo({
                top: document.querySelector('.video-player-container').offsetTop - 10,
                behavior: 'smooth'
            });
        }

        // Busca dados do RSS
        async function fetchReels() {
            try {
                const response = await fetch(RSS_FEED_URL);
                if (!response.ok) throw new Error('Falha ao buscar feed');
                const data = await response.json();
                
                // Remove spinner
                const spinner = document.getElementById('loading-spinner');
                if(spinner) spinner.remove();

                const items = data.items || [];
                
                // Atualiza contagem
                videoCountSpan.innerText = `${items.length} vídeos na grelha`;

                if (items.length > 0) {
                    // Atualiza tempo dinâmico do player com o vídeo mais recente
                    dynamicUpdateTime.innerText = formatRelativeTime(items[0].date_published);
                    
                    // Renderiza os cards
                    items.forEach(item => {
                        // Extração da imagem de capa (tentativas múltiplas)
                        let mediaUrl = 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=400';
                        if (item.attachments && item.attachments.length > 0 && item.attachments[0].url) {
                            mediaUrl = item.attachments[0].url;
                        } else if (item.image) {
                            mediaUrl = item.image;
                        }

                        // Limpa título (remove HTML se houver)
                        const cleanTitle = item.title ? item.title.replace(/<\/?[^>]+(>|$)/g, "") : "História Antiga";
                        
                        // Cria elemento do card
                        const card = document.createElement('div');
                        card.className = 'reel-card';
                        // Ao clicar, chama a função de troca, passando a URL do item
                        card.onclick = () => changeMainVideo(item.url);

                        card.innerHTML = `
                            <div class="card-thumb">
                                <img src="${mediaUrl}" alt="${cleanTitle}" loading="lazy">
                                <div class="play-overlay"><i class="fas fa-play"></i></div>
                            </div>
                            <div class="card-info">
                                <h3 class="card-title">${cleanTitle}</h3>
                                <p class="card-date">${formatRelativeTime(item.date_published)}</p>
                            </div>
                        `;
                        reelsGrid.appendChild(card);
                    });
                } else {
                    reelsGrid.innerHTML = '<div class="loading">Nenhum vídeo encontrado recentemente.</div>';
                }

            } catch (error) {
                console.error('Erro:', error);
                reelsGrid.innerHTML = '<div class="loading" style="color:#ef4444;">Erro ao carregar o feed. Por favor, tente mais tarde.</div>';
                videoCountSpan.innerText = 'Erro';
            }
        }

        // Inicialização
        updateCurrentDate();
        fetchReels();

    </script>

            c.id = "CleverCoreLoader101444";

</body>
</html>
