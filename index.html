<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Futebol ao Vivo</title>
</head>
<body>

<h1>Jogos de Hoje</h1>
<button onclick="carregarJogos()">Carregar Jogos</button>

<ul id="jogos"></ul>

<script>
const API_KEY = "SUA_NOVA_API_KEY"; // ⚠️ visível

function carregarJogos() {
  fetch("https://api.sportsapi.com/v1/football/matches", {
    method: "GET",
    headers: {
      "Authorization": "Bearer " + API_KEY
    }
  })
  .then(res => res.json())
  .then(data => {
    const lista = document.getElementById("jogos");
    lista.innerHTML = "";

    data.matches.forEach(jogo => {
      const li = document.createElement("li");
      li.innerText = `${jogo.home_team} vs ${jogo.away_team}`;
      lista.appendChild(li);
    });
  })
  .catch(err => console.error("Erro:", err));
}
</script>

</body>
</html>
