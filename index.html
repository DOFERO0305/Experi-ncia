<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportsLive Pro | Real-Time</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); padding: 20px; }
        header { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .status-live { color: var(--accent); font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }
        .pulse { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: p 1s infinite; }
        @keyframes p { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .match-card { background: var(--card-bg); border-radius: 15px; padding: 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .team { flex: 1; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .score-area { flex: 1; text-align: center; }
        .score { font-size: 2.5rem; font-weight: 800; display: block; color: var(--accent); }
        .match-time { font-size: 0.9rem; color: var(--text-muted); background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 20px; }
        #debug { background: #450a0a; color: #fca5a5; padding: 15px; border-radius: 8px; margin-top: 20px; display: none; font-family: monospace; font-size: 12px; white-space: pre-wrap; border: 1px solid #ef4444; }
        .loading { text-align: center; padding: 50px; color: var(--text-muted); font-style: italic; }
    </style>
</head>
<body>

<header>
    <div class="logo">⚽ SportsLive</div>
    <div class="status-live"><span class="pulse"></span> AO VIVO</div>
</header>

<div id="container">
    <div class="loading" id="loader">Conectando aos servidores da SportsAPI Pro...</div>
</div>

<div id="debug"></div>

<script>
    const API_KEY = '36cb090c-d7ac-4a18-bffc-61d3b57ff1a9';
    // Usando o ID que você passou. Se quiser todos os jogos, a URL muda para /matches/today
    const URL_ALVO = 'https://v2.football.sportsapipro.com/api/match/14025056';
    
    // Proxy para evitar erro de CORS no navegador
    const PROXY = 'https://api.allorigins.win/raw?url=';

    async function loadData() {
        const container = document.getElementById('container');
        const debug = document.getElementById('debug');
        
        try {
            const response = await fetch(PROXY + encodeURIComponent(URL_ALVO), {
                method: 'GET',
                headers: {
                    'x-api-key': API_KEY,
                    'Accept': 'application/json'
                }
            });

            if (!response.ok) throw new Error('Erro na resposta do servidor: ' + response.status);

            const json = await response.json();
            const data = json.data || json; // Garante pegar os dados se vierem dentro de "data"

            // Log de segurança para você ver no console do navegador (F12)
            console.log("Dados Recebidos:", data);

            if (data) {
                renderMatch(data);
            } else {
                throw new Error('A API retornou sucesso, mas sem dados da partida.');
            }

        } catch (err) {
            document.getElementById('loader').style.display = 'none';
            debug.style.display = 'block';
            debug.innerText = "ERRO TÉCNICO:\n" + err.message + "\n\nResposta da API (ver console F12)";
            console.error(err);
        }
    }

    function renderMatch(m) {
        const container = document.getElementById('container');
        container.innerHTML = '';

        // Mapeamento dinâmico (Tenta várias chaves comuns em APIs de futebol)
        const homeName = m.home_team?.name || m.homeTeam?.name || m.localTeam?.name || "Time Casa";
        const awayName = m.away_team?.name || m.awayTeam?.name || m.visitorTeam?.name || "Time Fora";
        const homeScore = m.stats?.home_score ?? m.scores?.localteam_score ?? m.home_score ?? 0;
        const awayScore = m.stats?.away_score ?? m.scores?.visitorteam_score ?? m.away_score ?? 0;
        const status = m.status_name || m.status || m.time?.status || "Agendado";

        const html = `
            <div class="match-card">
                <div class="team">${homeName}</div>
                <div class="score-area">
                    <span class="match-time">${status}</span>
                    <span class="score">${homeScore} - ${awayScore}</span>
                </div>
                <div class="team">${awayName}</div>
            </div>
            <div style="text-align:center; color:gray; font-size:12px;">ID da Partida: ${m.id || 'N/A'}</div>
        `;
        container.innerHTML = html;
    }

    loadData();
</script>

</body>
</html>
